name: CI/CD Pipeline

on:
  push:

jobs:
  test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Start Docker Compose
        run: |
          docker compose up -d --build

      - name: Wait services
        run: |
          sleep 20

      - name: Install dependencies
        run: |
          pip install pytest requests

      - name: Run concurrent tests
        run: |
          pytest tests/test_compra_concurrente.py -v
          pytest tests/test_cincuenta_usuarios.py -v

      - name: Stop Redis
        run: |
          docker compose stop redis

      - name: Wait Redis shutdown
        run: |
          sleep 5

      - name: Run Redis failure test
        run: |
          pytest tests/test_redis_caido.py -v

      - name: Stop Docker Compose
        if: always()
        run: |
          docker compose down